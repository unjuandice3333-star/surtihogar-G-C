name: Build iOS App (Surtihogar G&C)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Permite ejecutar la compilación manualmente desde GitHub

jobs:
  build-ios:
    name: Compilar iOS (.app sin firmar)
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios --verbose

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     -derivedDataPath ios/App/build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_ONLY=NO \
                     clean build


      - name: Compress Compiled App
        run: |
          cd ios/App/build/Build/Products/Debug-iphoneos
          zip -r Surtihogar_GC_iOS.zip App.app

      - name: Upload Compiled App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Surtihogar_GC_iOS_Debug
          path: ios/App/build/Build/Products/Debug-iphoneos/Surtihogar_GC_iOS.zip
